name: mukhametdinov-final4

services:
  mysql:
    image: mysql:latest
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: world
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: on-failure

  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"
    restart: on-failure

  app:
    build: .
    container_name: app
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    restart: on-failure

volumes:
  mysql_data: