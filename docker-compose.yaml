version: '3.9'
services:
  postgres:
    image: postgres:latest
    container_name: final4_postgres
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: postgres_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/data

  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  pgdata: